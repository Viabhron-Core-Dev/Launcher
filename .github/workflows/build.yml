name: Build Android Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download Gradle wrapper jar
      run: |
        curl -L "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o gradle-8.9-bin.zip
        unzip -p gradle-8.9-bin.zip "gradle-8.9/lib/plugins/gradle-wrapper-*.jar" > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
        unzip gradle-8.9-bin.zip -d gradle-tmp && \
        find gradle-tmp -name "gradle-wrapper.jar" | head -1 | xargs -I{} cp {} gradle/wrapper/gradle-wrapper.jar && \
        rm -rf gradle-tmp gradle-8.9-bin.zip

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
